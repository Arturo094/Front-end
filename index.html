<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Empresa de Gasfitería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        AquaFix - Empresa de Gasfitería
    </h1>

    <div id="mensaje"></div>

    <div class="card">

        <div class="card-header bg-primary text-white">
            Formulario de Servicios
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Código Servicio</label>
                    <input type="text" class="form-control" id="codigo">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Nombre Servicio</label>
                    <input type="text" class="form-control" id="nombre">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Descripción</label>
                    <input type="text" class="form-control" id="descripcion">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Precio</label>
                    <input type="number" class="form-control" id="precio">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Tipo Servicio</label>

                    <select id="tipo" class="form-select">

                        <option value="">Seleccione</option>
                        <option>Reparación</option>
                        <option>Instalación</option>
                        <option>Mantención</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">
                    <label>Tiempo Estimado</label>
                    <input type="text" class="form-control" id="tiempo">
                </div>

                <div class="col-md-6 mb-3">

                    <label>Prioridad</label>

                    <select id="prioridad" class="form-select">

                        <option value="">Seleccione</option>
                        <option>Baja</option>
                        <option>Media</option>
                        <option>Alta</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">
                    <label>Técnico</label>
                    <input type="text" class="form-control" id="tecnico">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Zona</label>
                    <input type="text" class="form-control" id="zona">
                </div>

                <div class="col-md-6 mb-3">

                    <label>Estado</label>

                    <select id="estado" class="form-select">

                        <option value="">Seleccione</option>
                        <option>Pendiente</option>
                        <option>En Proceso</option>
                        <option>Finalizado</option>

                    </select>

                </div>

            </div>

            <div class="text-center">

                <button class="btn btn-primary" onclick="consultar()">
                    Consultar
                </button>

                <button class="btn btn-success" onclick="registrar()">
                    Registrar
                </button>

                <button class="btn btn-warning" onclick="modificar()">
                    Modificar
                </button>

                <button class="btn btn-danger" onclick="eliminarServicio()">
                    Eliminar
                </button>

            </div>

        </div>

    </div>

    <br>

    <div class="card">

        <div class="card-header bg-success text-white">
            Estadísticas
        </div>

        <div class="card-body">

            <p><strong>Cantidad de registros:</strong> <span id="cantidad">0</span></p>

            <p><strong>Suma de precios:</strong> $<span id="suma">0</span></p>

            <p><strong>Promedio:</strong> $<span id="promedio">0</span></p>

        </div>

    </div>

    <br>

    <div class="card">

        <div class="card-header bg-dark text-white">
            Lista de Servicios
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped text-center">

                <thead class="table-secondary">

                <tr>

                    <th>Código</th>
                    <th>Servicio</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Tipo</th>
                    <th>Tiempo</th>
                    <th>Prioridad</th>
                    <th>Técnico</th>
                    <th>Zona</th>
                    <th>Estado</th>

                </tr>

                </thead>

                <tbody id="tabla">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/funciones.js"></script>

</body>
</html>
